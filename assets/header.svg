<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0D13"/>
      <stop offset="0.55" stop-color="#0B0E14"/>
      <stop offset="1" stop-color="#0C1A20"/>
    </linearGradient>
    <linearGradient id="name" x1="60" y1="120" x2="620" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#9FC3FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4C8DFF"/>
      <stop offset="1" stop-color="#2FD3C6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4C8DFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7FB0FF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#4C8DFF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="frame"><rect width="1200" height="300" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="300" fill="url(#bg)"/>

    <!-- faint dot grid -->
    <g fill="#1B2A3A" opacity="0.5">
      <circle cx="40" cy="40" r="1.5"/><circle cx="90" cy="40" r="1.5"/><circle cx="140" cy="40" r="1.5"/>
      <circle cx="1120" cy="260" r="1.5"/><circle cx="1160" cy="260" r="1.5"/><circle cx="1160" cy="220" r="1.5"/>
    </g>

    <!-- ambient drifting diamonds (KRNL layered mark) -->
    <g stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.18" stroke-linejoin="round">
      <g transform="translate(1010 70)">
        <path d="M40 0 L0 20 L40 40 L80 20 Z M0 50 L40 70 L80 50 M0 35 L40 55 L80 35"/>
        <animateTransform attributeName="transform" type="translate" values="1010 70; 1010 82; 1010 70" dur="7s" repeatCount="indefinite"/>
      </g>
    </g>
    <g transform="translate(980 40)">
      <path d="M70 0 L0 35 L70 70 L140 35 Z M0 87 L70 122 L140 87 M0 61 L70 96 L140 61"
            stroke="url(#accent)" stroke-width="3" fill="none" stroke-linejoin="round" opacity="0.9"/>
      <animateTransform attributeName="transform" type="translate" values="980 40; 980 30; 980 40" dur="6s" repeatCount="indefinite"/>
    </g>

    <!-- eyebrow -->
    <text x="62" y="86" fill="#5FA0FF" font-size="15" font-weight="600" letter-spacing="4">IIT BOMBAY  ·  FULL-STACK  ·  ML</text>

    <!-- name -->
    <text x="60" y="158" fill="url(#name)" font-size="66" font-weight="800" letter-spacing="-1.5">Pranesh Bandiya</text>

    <!-- animated underline -->
    <rect x="62" y="176" width="250" height="4" rx="2" fill="url(#accent)">
      <animate attributeName="width" values="0; 250" dur="1.1s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>

    <!-- tagline -->
    <text x="62" y="222" fill="#96A2B4" font-size="22" font-weight="400">I take ideas from a 2 AM prototype to a deployed product people use.</text>

    <!-- status row -->
    <circle cx="70" cy="258" r="6" fill="#3FB950">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="86" y="264" fill="#C9D4E3" font-size="17" font-weight="500">Currently building <tspan fill="#4C8DFF" font-weight="700">KRNL</tspan> — live in production</text>

    <!-- moving shine -->
    <rect x="-500" y="0" width="360" height="300" fill="url(#shine)" transform="skewX(-18)">
      <animate attributeName="x" values="-500; 1500" dur="5.5s" repeatCount="indefinite"/>
    </rect>

    <rect x="1" y="1" width="1198" height="298" rx="18" fill="none" stroke="#1E2A38" stroke-width="1.5"/>
  </g>
</svg>
